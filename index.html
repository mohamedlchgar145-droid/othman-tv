<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OHTMAN TV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header" id="main-header">
        <button class="header-btn" id="back-btn" onclick="goBack()" style="display: none;"><i class="fas fa-arrow-right"></i></button>
        <button class="header-btn" id="menu-btn"><i class="fas fa-bars"></i></button>
        <div class="app-title" id="main-app-title">OHTMAN TV</div>
        <button class="header-btn"><i class="fas fa-search"></i></button>
    </header>

    <main class="content-area">
        <section id="screen-home" class="app-screen active">
            <div class="grid-container">
                <div class="card-item" onclick="openSubCategory('beIN MAX')">
                    <div class="card-thumb purple-thumb">beIN SPORTS</div>
                    <div class="card-name">beIN MAX</div>
                </div>
                <div class="card-item" onclick="openSubCategory('beIN 4K')">
                    <div class="card-thumb purple-thumb">beIN SPORTS</div>
                    <div class="card-name">beIN 4K</div>
                </div>
                <div class="card-item" onclick="openSubCategory('beIN HD')">
                    <div class="card-thumb purple-thumb">beIN SPORTS</div>
                    <div class="card-name">beIN HD</div>
                </div>
                <div class="card-item"><div class="card-thumb b-thumb" style="color:#ef4444;">WORLD SPORT</div><div class="card-name">WORLD SPORT</div></div>
                <div class="card-item"><div class="card-thumb b-thumb" style="color:#3b82f6;"><i class="fas fa-soccer-ball"></i> ARAB SPORT</div><div class="card-name">ARBA SPORT</div></div>
                <div class="card-item"><div class="card-thumb purple-thumb">beIN SPORTS</div><div class="card-name">beIN SD</div></div>
            </div>
        </section>

        <section id="screen-sub-channels" class="app-screen">
            <div class="grid-container" id="sub-channels-grid"></div>
        </section>

        <section id="screen-categories" class="app-screen">
            <div class="grid-container">
                <div class="card-item-flag"><div class="flag-circle">🇲🇦</div><div class="card-name">MOROCCO</div></div>
                <div class="card-item-flag"><div class="flag-circle">🇪🇬</div><div class="card-name">EGYPT</div></div>
                <div class="card-item-flag"><div class="flag-circle">🇸🇦</div><div class="card-name">SAUDI</div></div>
            </div>
        </section>

        <section id="screen-movies" class="app-screen">
            <div class="sub-tabs">
                <button class="sub-tab-btn active">الأفلام</button>
                <button class="sub-tab-btn">المسلسلات</button>
            </div>
            <div class="movies-grid">
                <div class="movie-card">
                    <div class="movie-poster">أفلام<br>نتفلكس</div>
                    <div class="movie-title">افلام EN نتفلكس</div>
                </div>
            </div>
        </section>

        <section id="screen-matches" class="app-screen">
            <div class="matches-container">
                <div class="match-row">
                    <div class="team"><span class="flag">🇦🇷</span> الأرجنتين</div>
                    <div class="match-info"><span class="m-time">بتوقيت مكة</span><span class="m-status live">مباشر</span></div>
                    <div class="team">النمسا <span class="flag">🇦🇹</span></div>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchScreen('home', this)"><i class="fas fa-home"></i><span>الرئيسية</span></button>
        <button class="nav-item" onclick="switchScreen('categories', this)"><i class="fas fa-th-large"></i><span>الباقات</span></button>
        <button class="nav-item" onclick="switchScreen('movies', this)"><i class="fas fa-film"></i><span>الأفلام</span></button>
        <button class="nav-item" onclick="switchScreen('matches', this)"><i class="fas fa-calendar-alt"></i><span>المباريات</span></button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
